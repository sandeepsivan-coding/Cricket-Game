<!DOCTYPE html>
<html lang="en">
<head>
  <title>Cricket Game</title>
  <link rel="stylesheet" href="cricket.css">
</head>
<body>
  <h1>Bat Ball Stump Game</h1>
  
  
  <button class="choice-button" onclick="
  let computerChoice= generateComputerChoice();
  let resultMessage = getResult('Bat',computerChoice)
  showResult('Bat',computerChoice,resultMessage)
  "><img src="images/bat.png" alt="Bat-image" class="choice-image"></button>

  <button class="choice-button" onclick="
  computerChoice=generateComputerChoice();
  resultMessage = getResult('Ball',computerChoice);
  showResult('Ball',computerChoice,resultMessage) 
  "><img src="images/ball.png" alt="Ball-image" class="choice-image"></button>

  <button class="choice-button"   onclick="
  computerChoice=generateComputerChoice();
  resultMessage = getResult('Stump',computerChoice)
  showResult('Stump',computerChoice,resultMessage)
  "><img src="images/stump.png" alt="Stump-image" class="choice-image"></button>

  

  <h3 id="user-move"></h3>
  <h3 id="computer-move"></h3>
  <h3 id="result"></h3>
  <h3 id="score"></h3>

  <button onclick="localStorage.clear()
      resetScore();"
  >Reset</button>

 <script>
  let scoreStr= localStorage.getItem('Score')
  let score;
  resetScore(scoreStr);
  function resetScore(scoreStr){
    score=scoreStr ? JSON.parse(scoreStr) :{
      win:0,
      loss:0,
      tie:0,

    };
    score.displayScore = function(){
      return `Win:${score.win}  Lost:${score.loss}  Tie:${score.tie}`;};

      showResult();
    
}
 
  function generateComputerChoice(){
    let randomNumber= Math.random() * 3;
    if(randomNumber>0 && randomNumber<=1){
      return 'Bat';
    }
    else if(randomNumber>1 && randomNumber<=2){
      return 'Ball';
    }
    else{
      return 'Stump';
    }
  }
  function getResult(userMove,computerMove){
    if(userMove==='Bat'){
      if(computerMove==='Bat'){
        score.tie++;
        return`It's a Tie.`
      }
      else if(computerMove==='Ball'){
        score.win++;
        return'User Won'
      }
      else{
        score.loss++;
        return `Computer Won`
      }
    }
    else if(userMove==='Ball'){
      if(computerChoice==='Bat'){
        score.loss++;
        return'Computer Won';
      }
      else if(computerChoice==='Ball'){
        score.tie++;
        return`It's a Tie`;
      }
      else{
        score.win++;
        return'User Won';
      }
    }
    else{
      if(computerChoice==='Bat'){
        score.win++;
        return'User Won';
      }
      else if(computerChoice==='Ball'){
        score.loss++;
        return'Computer Won';
      }
      else{
        score.tie++;
        return`It's a Tie`;
      }
    }
  }
  function showResult(userMove,computerMove,result){
    localStorage.setItem('Score',JSON.stringify(score));

    document.querySelector('#user-move').innerText=userMove ? `You have chosen ${userMove}` : '';

    document.querySelector('#computer-move').innerText= computerMove ?`Computer choice is ${computerMove}`: '';

    document.querySelector('#result').innerText=result||'';

    document.querySelector('#score').innerText=score.displayScore();
    
  }
 </script> 
</body>
</html>
